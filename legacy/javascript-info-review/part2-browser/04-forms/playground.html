<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ch 4 — Forms playground</title>
  <style>
    body { font-family: system-ui; margin: 2rem; max-width: 760px; }
    section { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    output { display: block; background: #f6f6f6; padding: .5rem; margin-top: .5rem; white-space: pre-wrap; font-family: monospace; max-height: 140px; overflow: auto; }
    .invalid { border: 2px solid crimson; }
    label { display: block; margin: .25rem 0; }
  </style>
</head>
<body>
  <h1>Forms: navigation, focus/blur, change/input, submit</h1>

  <section>
    <h2>1. Form navigation &amp; value extraction</h2>
    <form name="order" id="orderForm">
      <label>name: <input name="user" value="Ann"></label>
      <label>size:
        <select name="size">
          <option value="s">small</option>
          <option value="m" selected>medium</option>
          <option value="l">large</option>
        </select>
      </label>
      <label><input type="checkbox" name="gift" value="yes"> gift wrap</label>
      <label><input type="radio" name="pay" value="card" checked> card</label>
      <label><input type="radio" name="pay" value="cash"> cash</label>
    </form>
    <button id="navBtn">read the form via document.forms</button>
    <output id="navOut"></output>
  </section>

  <section>
    <h2>2. focus/blur, focusin delegation, tabindex</h2>
    <form id="focusForm">
      <input name="a" placeholder="field a">
      <input name="b" placeholder="field b">
      <span tabindex="0" style="border:1px dotted; padding:2px 6px">focusable span (tabindex=0)</span>
    </form>
    <output id="focusOut"></output>
  </section>

  <section>
    <h2>3. input vs change (type in both, then tab away)</h2>
    <label>input event: <input id="inputEv"></label>
    <label>change event: <input id="changeEv"></label>
    <output id="ioOut"></output>
  </section>

  <section>
    <h2>4. submit: validate, prevent, FormData</h2>
    <form id="loginForm">
      <label>email: <input name="email" type="email" required placeholder="a@b.c"></label>
      <label>password: <input name="password" type="password" minlength="4" required></label>
      <button type="submit">Log in</button>
    </form>
    <output id="submitOut"></output>
  </section>

<script src="./playground.js"></script>
</body>
</html>
