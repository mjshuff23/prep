<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Web components playground</title>
  <style>
    body { font-family: system-ui; margin: 2rem; max-width: 900px; }
    section { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    button { margin: .25rem .25rem .25rem 0; }
    output { display: block; background: #f6f6f6; padding: .5rem; margin-top: .5rem; white-space: pre-wrap; font-family: monospace; max-height: 240px; overflow: auto; }
    #componentHost { display: grid; gap: .75rem; margin: 1rem 0; }
    review-card { --card-accent: #28666e; }
  </style>
</head>
<body>
  <h1>Custom elements, Shadow DOM, slots</h1>

  <template id="cardTemplate">
    <style>
      :host {
        display: block;
        max-width: 420px;
        border: 1px solid #bbb;
        border-left: 6px solid var(--card-accent, #555);
        border-radius: 8px;
        padding: 1rem;
        background: white;
      }
      h2 { margin: 0 0 .5rem; font-size: 1.1rem; }
      .body { color: #333; }
      ::slotted([slot="title"]) { color: var(--card-accent, #555); }
      button { margin-top: .75rem; }
    </style>
    <h2><slot name="title">Untitled card</slot></h2>
    <div class="body">
      <slot>Default card body</slot>
    </div>
    <p>Observed name: <strong id="nameOut"></strong></p>
    <button id="shadowButton">dispatch composed event</button>
  </template>

  <section>
    <h2>1. Component lifecycle and attributes</h2>
    <button id="addCard">add component</button>
    <button id="renameCard">change name attribute</button>
    <button id="removeCard">remove component</button>
    <div id="componentHost"></div>
    <output id="componentOut"></output>
  </section>

  <script>
    const componentOut = document.getElementById("componentOut");
    const host = document.getElementById("componentHost");
    const log = (line) => {
      componentOut.textContent += line + "\n";
      componentOut.scrollTop = componentOut.scrollHeight;
    };

    if (!customElements.get("review-card")) {
      customElements.define("review-card", class ReviewCard extends HTMLElement {
        static observedAttributes = ["name"];

        constructor() {
          super();
          const shadow = this.attachShadow({ mode: "open" });
          const template = document.getElementById("cardTemplate");
          shadow.append(template.content.cloneNode(true));
          shadow.getElementById("shadowButton").addEventListener("click", () => {
            this.dispatchEvent(new CustomEvent("card-action", {
              bubbles: true,
              composed: true,
              detail: { name: this.getAttribute("name") },
            }));
          });
        }

        connectedCallback() {
          log(`<review-card name="${this.getAttribute("name")}"> connected`);
          this.render();
        }

        disconnectedCallback() {
          log(`<review-card name="${this.getAttribute("name")}"> disconnected`);
        }

        attributeChangedCallback(name, oldValue, newValue) {
          log(`attributeChangedCallback: ${name} ${oldValue} -> ${newValue}`);
          this.render();
        }

        render() {
          const nameOut = this.shadowRoot?.getElementById("nameOut");
          if (nameOut) nameOut.textContent = this.getAttribute("name") ?? "(missing)";
        }
      });
    }

    host.addEventListener("card-action", (event) => {
      const path = event.composedPath();
      const first = path[0] instanceof Element ? path[0].tagName.toLowerCase() : String(path[0]);
      const target = event.target instanceof Element ? event.target.tagName.toLowerCase() : String(event.target);
      log(`card-action detail=${JSON.stringify(event.detail)} target=${target} path[0]=${first}`);
    });

    document.getElementById("addCard").addEventListener("click", () => {
      if (host.querySelector("review-card")) {
        log("component already exists");
        return;
      }
      const card = document.createElement("review-card");
      card.setAttribute("name", "Ada");
      card.innerHTML = `
        <span slot="title">Slotted title</span>
        <p>This paragraph lives in light DOM and is projected through a slot.</p>
      `;
      host.append(card);
    });

    document.getElementById("renameCard").addEventListener("click", () => {
      const card = host.querySelector("review-card");
      if (!card) {
        log("add the component first");
        return;
      }
      const next = card.getAttribute("name") === "Ada" ? "Grace" : "Ada";
      card.setAttribute("name", next);
    });

    document.getElementById("removeCard").addEventListener("click", () => {
      const card = host.querySelector("review-card");
      if (!card) {
        log("nothing to remove");
        return;
      }
      card.remove();
    });
  </script>
</body>
</html>
