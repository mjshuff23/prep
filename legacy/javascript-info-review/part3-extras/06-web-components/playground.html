<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Web components playground</title>
  <style>
    body { font-family: system-ui; margin: 2rem; max-width: 900px; }
    section { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    button { margin: .25rem .25rem .25rem 0; }
    output { display: block; background: #f6f6f6; padding: .5rem; margin-top: .5rem; white-space: pre-wrap; font-family: monospace; max-height: 240px; overflow: auto; }
    #componentHost { display: grid; gap: .75rem; margin: 1rem 0; }
    review-card { --card-accent: #28666e; }
  </style>
</head>
<body>
  <h1>Custom elements, Shadow DOM, slots</h1>

  <template id="cardTemplate">
    <style>
      :host {
        display: block;
        max-width: 420px;
        border: 1px solid #bbb;
        border-left: 6px solid var(--card-accent, #555);
        border-radius: 8px;
        padding: 1rem;
        background: white;
      }
      h2 { margin: 0 0 .5rem; font-size: 1.1rem; }
      .body { color: #333; }
      ::slotted([slot="title"]) { color: var(--card-accent, #555); }
      button { margin-top: .75rem; }
    </style>
    <h2><slot name="title">Untitled card</slot></h2>
    <div class="body">
      <slot>Default card body</slot>
    </div>
    <p>Observed name: <strong id="nameOut"></strong></p>
    <button id="shadowButton">dispatch composed event</button>
  </template>

  <section>
    <h2>1. Component lifecycle and attributes</h2>
    <button id="addCard">add component</button>
    <button id="renameCard">change name attribute</button>
    <button id="removeCard">remove component</button>
    <div id="componentHost"></div>
    <output id="componentOut"></output>
  </section>

  <script src="./playground.js"></script>
</body>
</html>
