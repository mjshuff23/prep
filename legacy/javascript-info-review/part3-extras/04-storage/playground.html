<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Storage playground</title>
  <style>
    body { font-family: system-ui; margin: 2rem; max-width: 860px; }
    section { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    button, input { margin: .25rem .25rem .25rem 0; }
    output { display: block; background: #f6f6f6; padding: .5rem; margin-top: .5rem; white-space: pre-wrap; font-family: monospace; max-height: 220px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Cookies, Web Storage, IndexedDB</h1>

  <section>
    <h2>1. Cookies via document.cookie</h2>
    <input id="cookieValue" value="vanilla" />
    <button id="setCookie">set cookie</button>
    <button id="readCookie">read document.cookie</button>
    <button id="clearCookie">expire cookie</button>
    <output id="cookieOut"></output>
  </section>

  <section>
    <h2>2. localStorage vs sessionStorage</h2>
    <input id="storageValue" value="draft note" />
    <button id="writeStorage">write both</button>
    <button id="readStorage">read both</button>
    <button id="openTwin">open same page in another tab</button>
    <output id="storageOut"></output>
  </section>

  <section>
    <h2>3. Minimal IndexedDB wrapper</h2>
    <input id="noteText" value="IndexedDB note" />
    <button id="addNote">add note</button>
    <button id="listNotes">list notes</button>
    <button id="clearNotes">clear notes</button>
    <output id="idbOut"></output>
  </section>

  <script src="./playground.js"></script>
</body>
</html>
